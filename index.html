<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>余白の一鉢｜観葉植物診断</title>
  <meta name="description" content="12問で、今のあなたに合う観葉植物を提案します。" />
  <link rel="stylesheet" href="./style.css?v=imgdbg001" />
</head>

<body id="top">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="./index.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <span class="brand-sub">余白の一鉢</span>
          <span class="brand-main">観葉植物診断</span>
        </span>
      </a>
      <div class="header-pill">個人情報不要 / 約2分</div>
    </div>
  </header>

  <main class="container">
    <section class="hero card">
      <h1>忙しい日々に、余白を取り戻す一鉢を。</h1>
      <p class="text-muted">
        12問で、今のあなたに合う「育てやすい観葉植物」を提案します。<br>
        主タイプ×副タイプから、おすすめ3種＋育て方・花言葉・なぜ合うかを表示します。
      </p>

      <div class="hero-actions">
        <button class="btn primary" id="btnStart" type="button">診断をはじめる</button>
        <button class="btn ghost" id="btnAbout" type="button">この診断について</button>
      </div>

      <div class="about" id="aboutBox" hidden>
        <div class="hr"></div>
        <h2>この診断について</h2>
        <ul>
          <li>医療・治療ではありません。気分を整えるための目安です。</li>
          <li>植物は環境差があるので、様子を見て調整してOK。</li>
          <li>水やりは「春夏 / 冬」で簡略表示します。</li>
        </ul>
      </div>
    </section>

    <div class="hr"></div>

    <section id="diagnosis" class="card">
      <div class="sectionTitle">診断フォーム</div>

      <div class="progressRow">
        <div class="progressTrack">
          <div class="progressFill" id="progressFill"></div>
        </div>
        <div class="progressText"><span id="answeredCount">0</span> / 12</div>
      </div>

      <div id="quiz" class="quiz"></div>

      <div class="actionsRow">
        <button class="btn ghost" id="btnReset" type="button">リセット</button>
        <button class="btn primary" id="btnResult" type="button" disabled>結果を見る</button>
        <button class="btn ghost" id="btnTop" type="button">TOPへ戻る</button>
      </div>
    </section>

    <div class="hr"></div>

    <section id="result" class="card" hidden>
      <div class="sectionTitle">あなたの今のタイプ</div>

      <div class="typeGrid">
        <div class="typeBox">
          <div class="label">主タイプ</div>
          <div class="typeName" id="mainType">-</div>
        </div>
        <div class="typeBox">
          <div class="label">副タイプ</div>
          <div class="typeName" id="subType">-</div>
        </div>
      </div>

      <p class="typeSummary" id="typeSummary"></p>

      <div id="plantGrid" class="plantGrid"></div>

      <div class="actionsRow">
        <button class="btn ghost" id="btnBack" type="button">質問に戻る</button>
        <button class="btn primary" id="btnTop2" type="button">TOPへ戻る</button>
      </div>
    </section>

    <footer class="footer">
      <span>© 余白の一鉢</span>
      <span class="text-muted">GitHub Pages</span>
    </footer>
  </main>

  <!-- ★scriptはこれ1本だけ（複数読み込み禁止） -->
  <script src="./app_fix.js?v=imgdbg001" defer></script>
</body>
</html>
